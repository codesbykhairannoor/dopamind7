[providers]
php = true
node = true

[phases.setup]
nixPkgs = ['php83', 'php83Packages.intl', 'php83Packages.zip', 'nodejs_20', 'npm']

[phases.build]
cmds = ['composer install --no-dev --optimize-autoloader', 'npm ci', 'npm run build']

[phases.deploy]
cmds = [
    'php artisan migrate --force',
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache',
    'php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=$PORT'
]